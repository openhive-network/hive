# Skip rules for CI job optimization based on changed files
# Include this file and use the patterns/templates in job rules
#
# Features:
#   1. Skip builds AND tests for docs-only changes
#   2. Skip builds (use cached binaries) for test-only changes
#   3. Run full pipeline for source code changes
#
# How it works:
#   - detect_changes job analyzes what files changed and sets DOCS_ONLY/TESTS_ONLY variables
#   - Build jobs skip when TESTS_ONLY=true or QUICK_TEST=true
#   - Test jobs skip when DOCS_ONLY=true (only documentation changed)
#   - quick_test_setup runs when TESTS_ONLY=true to fetch cached binaries
#   - Default behavior is to RUN jobs (safe fallback if detection fails)
#
# Safety: Uses blocklist approach - jobs run by default, skip only when certain
# it's safe. If detect_changes fails or doesn't run, jobs still execute.

variables:
  # Control variable to force full pipeline regardless of changes
  # Set to "true" to run all jobs even for docs-only or test-only changes
  FORCE_FULL_PIPELINE: "false"
  # Set by detect_changes job - indicates only documentation files changed
  DOCS_ONLY: "false"
  # Set by detect_changes job - indicates only test files changed (no source code)
  TESTS_ONLY: "false"

# ============================================================================
# Change Detection Job
# ============================================================================

# Detects what type of files changed and sets variables for other jobs
# Must run before build jobs in static_code_analysis stage
.detect_changes:
  stage: static_code_analysis
  image: alpine:latest
  needs: []
  allow_failure: true  # Fail-open: if detection fails, pipeline continues with defaults (full build)
  before_script:
    - apk add --no-cache git curl
  script:
    - |
      echo "Detecting what files changed..."

      # Determine base commit to compare against
      if [ -n "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]; then
        BASE_SHA="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
        echo "Using MR diff base: $BASE_SHA"
      elif [ -n "$CI_COMMIT_BEFORE_SHA" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        BASE_SHA="$CI_COMMIT_BEFORE_SHA"
        echo "Using commit before SHA: $BASE_SHA"
      else
        # For first commit on branch or other edge cases, compare to parent
        BASE_SHA="HEAD~1"
        echo "Using HEAD~1 as base"
      fi

      # Get list of changed files
      echo "Changed files:"
      CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
      echo "$CHANGED_FILES" | head -50

      # Documentation-only patterns (files that don't require builds or tests)
      # Uses blocklist approach: if ALL changed files match these patterns, skip CI
      DOCS_PATTERN='^(.*\.md|doc/|\.gitignore|\.gitattributes|\.dockerignore|\.editorconfig|CODEOWNERS|\.mailmap)$'

      # Check if ONLY documentation files changed (blocklist approach - safe default)
      DOCS_ONLY="false"
      if [ -n "$CHANGED_FILES" ]; then
        # Check if any file does NOT match the docs pattern
        NON_DOCS=$(echo "$CHANGED_FILES" | grep -vE "$DOCS_PATTERN" || true)
        if [ -z "$NON_DOCS" ]; then
          DOCS_ONLY="true"
          echo ">>> Only documentation files changed"
        fi
      fi

      # Check if source code changed (files that require C++ builds)
      # Uses source-patterns.sh as single source of truth
      SOURCE_PATTERN=$("$CI_PROJECT_DIR/scripts/ci-helpers/source-patterns.sh" --regex)
      SOURCE_CHANGED="false"
      if echo "$CHANGED_FILES" | grep -qE "$SOURCE_PATTERN"; then
        SOURCE_CHANGED="true"
      fi
      # tests/unit/ contains C++ sources compiled into the chain_test binary,
      # so changes there require rebuilding even though they live under tests/.
      # Kept here rather than in source-patterns.sh because downstream consumers
      # of that file (hived image lookup, clive) do not care about chain_test.
      if echo "$CHANGED_FILES" | grep -qE '^tests/unit/'; then
        SOURCE_CHANGED="true"
      fi

      # Check if tests changed
      TESTS_CHANGED="false"
      if echo "$CHANGED_FILES" | grep -qE '^tests/'; then
        TESTS_CHANGED="true"
      fi

      # Check if CI/scripts changed (should trigger full build)
      CI_CHANGED="false"
      if echo "$CHANGED_FILES" | grep -qE '^(\.gitlab-ci\.yaml|scripts/ci-helpers/)'; then
        CI_CHANGED="true"
      fi

      # Determine if this is a tests-only change
      # Tests-only means: tests changed, but source code and CI did NOT change
      TESTS_ONLY="false"
      if [ "$DOCS_ONLY" = "false" ] && [ "$TESTS_CHANGED" = "true" ] && [ "$SOURCE_CHANGED" = "false" ] && [ "$CI_CHANGED" = "false" ]; then
        echo ""
        echo "Tests-only change detected - checking for cached binaries..."

        # Check if cached testnet binaries exist in registry before enabling TESTS_ONLY
        # Query the registry API to find testnet repository and its tags
        CACHE_EXISTS="false"
        API_URL="${CI_API_V4_URL:-https://gitlab.syncad.com/api/v4}"
        PROJECT_ID="${CI_PROJECT_ID:-198}"

        # Find testnet repository ID
        REPOS_RESPONSE=$(curl -sf -H "JOB-TOKEN: ${CI_JOB_TOKEN:-}" \
          "$API_URL/projects/$PROJECT_ID/registry/repositories?per_page=100" 2>/dev/null) || true

        if [ -n "$REPOS_RESPONSE" ]; then
          # Extract testnet repository ID using grep/sed (no jq needed)
          TESTNET_REPO_ID=$(echo "$REPOS_RESPONSE" | grep -o '"id":[0-9]*,"name":"testnet"' | grep -o '[0-9]*' | head -1) || true

          if [ -n "$TESTNET_REPO_ID" ]; then
            # Check if there are any tags in the testnet repository
            TAGS_RESPONSE=$(curl -sf -H "JOB-TOKEN: ${CI_JOB_TOKEN:-}" \
              "$API_URL/projects/$PROJECT_ID/registry/repositories/$TESTNET_REPO_ID/tags?per_page=1" 2>/dev/null) || true

            if [ -n "$TAGS_RESPONSE" ] && echo "$TAGS_RESPONSE" | grep -q '"name"'; then
              CACHE_EXISTS="true"
              CACHED_TAG=$(echo "$TAGS_RESPONSE" | grep -o '"name":"[^"]*"' | head -1 | sed 's/"name":"//;s/"//') || true
              echo "Found cached binaries: testnet:$CACHED_TAG"
            fi
          fi
        fi

        if [ "$CACHE_EXISTS" = "true" ]; then
          TESTS_ONLY="true"
          echo ">>> TESTS_ONLY enabled - will use cached binaries"
        else
          echo ">>> No cached binaries found - will run full build"
          TESTS_ONLY="false"
        fi
      fi

      echo ""
      echo "Detection results:"
      echo "  DOCS_ONLY=$DOCS_ONLY"
      echo "  SOURCE_CHANGED=$SOURCE_CHANGED"
      echo "  TESTS_CHANGED=$TESTS_CHANGED"
      echo "  CI_CHANGED=$CI_CHANGED"
      echo "  TESTS_ONLY=$TESTS_ONLY"

      # Write to dotenv file for other jobs
      echo "DOCS_ONLY=$DOCS_ONLY" > detect_changes.env
      echo "TESTS_ONLY=$TESTS_ONLY" >> detect_changes.env
      echo "SOURCE_CHANGED=$SOURCE_CHANGED" >> detect_changes.env
  artifacts:
    reports:
      dotenv: detect_changes.env
  rules:
    # Skip detection on protected branches - always run full pipeline
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master"
      when: never
    # Skip on tags
    - if: $CI_COMMIT_TAG
      when: never
    # Skip if forcing full pipeline
    - if: $FORCE_FULL_PIPELINE == "true"
      when: never
    # Skip if QUICK_TEST is manually enabled
    - if: $QUICK_TEST == "true"
      when: never
    - when: on_success

# ============================================================================
# Source Code Patterns
# ============================================================================
# Defined in scripts/ci-helpers/source-patterns.sh (single source of truth)
# Used by detect_changes job and downstream repos like clive

# ============================================================================
# Rule Templates for Jobs
# ============================================================================

# Template: Skip build jobs if only docs OR only tests changed
# Use: extends: .skip_build_on_non_source_changes (for build jobs)
# Safety: Uses DOCS_ONLY/TESTS_ONLY variables - default to "false" so builds run if detection fails
.skip_build_on_non_source_changes:
  rules:
    # QUICK_TEST mode - skip builds (manual override)
    - if: $QUICK_TEST == "true"
      when: never
    # DOCS_ONLY mode - skip builds (auto-detected)
    - if: $DOCS_ONLY == "true"
      when: never
    # TESTS_ONLY mode - skip builds (auto-detected)
    - if: $TESTS_ONLY == "true"
      when: never
    # Force full pipeline if requested
    - if: $FORCE_FULL_PIPELINE == "true"
      when: on_success
    # Always run on protected branches (detect_changes doesn't run there)
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master"
      when: on_success
    # Always run on tags
    - if: $CI_COMMIT_TAG
      when: on_success
    # Default: run the build (safe fallback)
    - when: on_success

# Template: Run quick_test_setup when QUICK_TEST or TESTS_ONLY
# Use: extends: .quick_test_setup_rules
.quick_test_setup_rules:
  rules:
    # Run when QUICK_TEST is manually enabled
    - if: $QUICK_TEST == "true"
      when: always
    # Run when TESTS_ONLY is auto-detected
    - if: $TESTS_ONLY == "true"
      when: always
    # Don't run otherwise
    - when: never

# Template: Skip test jobs if only documentation changed
# Use: extend existing .test_tools_based or similar with these rules
# Safety: Uses DOCS_ONLY variable from detect_changes job. If detect_changes
# doesn't run (protected branches, tags), DOCS_ONLY defaults to "false" and jobs run.
.skip_test_on_docs_only:
  rules:
    # Force full pipeline if requested
    - if: $FORCE_FULL_PIPELINE == "true"
      when: on_success
    # Always run on protected branches (detect_changes doesn't run there)
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master"
      when: on_success
    # Always run on tags
    - if: $CI_COMMIT_TAG
      when: on_success
    # Skip if only documentation changed (detected by detect_changes job)
    - if: $DOCS_ONLY == "true"
      when: never
    # Default: run the job (safe fallback)
    - when: on_success

# Template: Skip test jobs if only docs changed, WITH QUICK_TEST/TESTS_ONLY support
# Use: replaces .test_tools_based rules block
# Note: These tests are skipped in QUICK_TEST mode but run in TESTS_ONLY mode
# Safety: Uses DOCS_ONLY variable - defaults to "false" so jobs run if detection fails
.skip_test_on_docs_only_with_quick_test:
  rules:
    # QUICK_TEST mode - skip heavy test jobs (only unit tests run)
    - if: $QUICK_TEST == "true"
      when: never
    # Force full pipeline if requested
    - if: $FORCE_FULL_PIPELINE == "true"
      when: on_success
    # Always run on protected branches (detect_changes doesn't run there)
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master"
      when: on_success
    # Always run on tags
    - if: $CI_COMMIT_TAG
      when: on_success
    # Skip if only documentation changed (detected by detect_changes job)
    - if: $DOCS_ONLY == "true"
      when: never
    # Default: run the job (safe fallback)
    - when: on_success

# ============================================================================
# Mainnet 5M Jobs - Manual on Feature Branches
# ============================================================================
# These templates make expensive mainnet_5m jobs (prepare_hived_data, replay tests)
# run as manual jobs on feature branches, saving ~60+ minutes by default.
# Users can still click to run them when needed.

# Template: Manual on feature branches, auto on integration branches
# Use for expensive jobs that don't need to run on every feature branch push
# - Feature branches: Manual (click to run)
# - develop/master/tags: Automatic
# - QUICK_TEST=true: Manual (same as feature branch)
# - TESTS_ONLY=true: Skip entirely (no new binaries to test)
# - FORCE_FULL_PIPELINE=true: Automatic (override)
.manual_on_feature_branches:
  rules:
    # Force full pipeline overrides everything
    - if: $FORCE_FULL_PIPELINE == "true"
      when: on_success
    # TESTS_ONLY mode - skip entirely (no point testing without new binaries)
    - if: $TESTS_ONLY == "true"
      when: never
    # QUICK_TEST mode - make jobs manual (user can click to run)
    - if: $QUICK_TEST == "true"
      when: manual
      allow_failure: true  # Don't block pipeline if user doesn't run these
    # Always run automatically on protected/integration branches
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master"
      when: on_success
    # Always run automatically on tags
    - if: $CI_COMMIT_TAG
      when: on_success
    # Feature branches: manual by default (saves ~60 min)
    - when: manual
      allow_failure: true  # Don't block pipeline if user doesn't run these

# Template: Same as above but also skips when TESTS_ONLY (no new binaries)
# Use for build jobs like prepare_hived_data
.manual_on_feature_branches_skip_tests_only:
  rules:
    # Force full pipeline overrides everything
    - if: $FORCE_FULL_PIPELINE == "true"
      when: on_success
    # TESTS_ONLY mode - skip entirely (no point without new binaries)
    - if: $TESTS_ONLY == "true"
      when: never
    # QUICK_TEST mode - make jobs manual
    - if: $QUICK_TEST == "true"
      when: manual
      allow_failure: true
    # Always run automatically on protected/integration branches
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master"
      when: on_success
    # Always run automatically on tags
    - if: $CI_COMMIT_TAG
      when: on_success
    # Feature branches: manual by default
    - when: manual
      allow_failure: true

# ============================================================================
# Legacy aliases (for backwards compatibility)
# ============================================================================

# Alias for the updated build skip rules
.skip_build_on_docs_only_with_quick_test:
  extends: .skip_build_on_non_source_changes
