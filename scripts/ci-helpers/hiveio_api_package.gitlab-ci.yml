# Note: When used from wax project, this file is included via:
#   - local: 'hive/scripts/ci-helpers/hiveio_api_package.gitlab-ci.yml'
# The common_includes.yml must be included separately in the main .gitlab-ci.yml
# because GitLab CI resolves 'local' paths relative to the project root.
#
# For hive project, include common_includes.yml before this file:
#   - local: 'scripts/ci-helpers/common_includes.yml'
#   - local: 'scripts/ci-helpers/hiveio_api_package.gitlab-ci.yml'
#
# For wax project (with hive submodule):
#   - local: 'hive/scripts/ci-helpers/common_includes.yml'
#   - local: 'hive/scripts/ci-helpers/hiveio_api_package.gitlab-ci.yml'

# Template for building and deploying the unified hiveio-api Python package
#
# This template uses hiveio_api_package.sh script which:
#   1. Determines package version from git state (no generation needed)
#   2. Checks if the package version already exists in GitLab PyPI registry
#   3. If exists: creates env file and exits (skips generation/build entirely)
#   4. If not: generates package, builds wheel, runs tests, and deploys to registry
#
# Downstream test jobs install hiveio-api from registry using WHEEL_BUILD_VERSION.
#
# Usage:
#   include:
#     - local: '/scripts/ci-helpers/hiveio_api_package.gitlab-ci.yml'
#
#   hiveio_api_package:
#     extends: .hiveio_api_package_template
#     variables:
#       HIVE_PROJECT_ROOT: "${CI_PROJECT_DIR}"  # or "${CI_PROJECT_DIR}/hive" for submodule
#
# Variables:
#   HIVE_PROJECT_ROOT           Root directory of the Hive project (default: "${CI_PROJECT_DIR}")
#   SKIP_WHEEL_DEPLOY           Set to "true" to skip deployment to GitLab PyPI registry
#   SKIP_REGISTRY_CHECK         Set to "true" to skip registry check (always build)
#   PACKAGE_REGISTRY_PROJECT_ID Project ID for package registry (default: CI_PROJECT_ID)
#                               Use this when running in a downstream project to publish
#                               to the upstream (hive) project's registry
#
# Artifacts:
#   - ${API_GENERATION_DIR}/python_api_package/dist/*.whl Built wheel (only present when built locally)
#   - build_wheel.env                                     Environment file with WHEEL_BUILD_VERSION (always)

.hiveio_api_package_template:
  extends: .build_wheel_template
  variables:
    HIVE_PROJECT_ROOT: "${CI_PROJECT_DIR}"
    API_GENERATION_DIR: "${HIVE_PROJECT_ROOT}/libraries/plugins/apis/api_generation"
    PYPROJECT_DIR: "${API_GENERATION_DIR}/api_generation"
    DEPENDENCY_SOURCE_DIR: "${HIVE_PROJECT_ROOT}/tests/python/hive-local-tools"
    SKIP_WHEEL_DEPLOY: ""
    SKIP_REGISTRY_CHECK: ""
  stage: build
  script:
    - |
      SCRIPT_ARGS=(
        "--hive-project-root=${HIVE_PROJECT_ROOT}"
        "--api-generation-dir=${API_GENERATION_DIR}"
        "--dependency-source-dir=${DEPENDENCY_SOURCE_DIR}"
        "--package-registry-project-id=${PACKAGE_REGISTRY_PROJECT_ID:-${CI_PROJECT_ID}}"
      )
      [[ "${SKIP_WHEEL_DEPLOY}" == "true" ]] && SCRIPT_ARGS+=("--skip-deploy")
      [[ "${SKIP_REGISTRY_CHECK}" == "true" ]] && SCRIPT_ARGS+=("--skip-registry-check")
      "${HIVE_PROJECT_ROOT}/scripts/ci-helpers/hiveio_api_package.sh" "${SCRIPT_ARGS[@]}"
  artifacts:
    expire_in: 1 week
    paths:
      - "${API_GENERATION_DIR}/python_api_package/dist"
      - "build_wheel.env"
    reports:
      dotenv: build_wheel.env
  tags:
    - public-runner-docker
