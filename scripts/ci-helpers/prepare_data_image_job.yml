variables:
  # Docker image tags - use "latest" for stable images from common-ci-configuration
  # Don't pin to CI_COMMON_JOB_VERSION as those commit-specific images may not exist
  BEEKEEPY_INITIALIZATION_TIMEOUT: 60  # for test-tools
  BEEKEEPY_CLOSE_TIMEOUT: 60  # for test-tools

include:
  - project: 'hive/common-ci-configuration'
    ref: develop
    file:
      - '/templates/base.gitlab-ci.yml'
      - '/templates/npm_projects.gitlab-ci.yml'
      - '/templates/wasm_build.gitlab-ci.yml'
      - '/templates/python_projects.gitlab-ci.yml'
      - '/templates/cache_cleanup.gitlab-ci.yml'
      - '/templates/docker_image_jobs.gitlab-ci.yml'
      - '/templates/test_jobs.gitlab-ci.yml'
  - local: scripts/ci-helpers/extended_block_log_creation.gitlab-ci.yml

.docker_image_builder_job:
  extends: .docker_image_builder_job_template
  variables:
    FF_NETWORK_PER_BUILD: "true"

  before_script:
    - !reference [.docker_image_builder_job_template, before_script]
    - git config --global --add safe.directory '*'

.docker_image_cleanup_job:
  extends: .docker_image_cleanup_job_template

.prepare_hived_image:
  extends: .docker_image_builder_job

  variables:
    SUBMODULE_DIR: "$CI_PROJECT_DIR"
    SCRIPTS_PATH: "$SUBMODULE_DIR/scripts"
    REGISTRY_USER: "$CI_IMG_BUILDER_USER"
    REGISTRY_PASS: $CI_IMG_BUILDER_PASSWORD
    BINARY_CACHE_PATH: "$CI_PROJECT_DIR/hived-binaries"
    HIVE_NETWORK_TYPE: mainnet
  script:
    - $SCRIPTS_PATH/ci-helpers/get_image4submodule.sh
        "$SUBMODULE_DIR" registry.gitlab.syncad.com/hive/hive HIVED "$REGISTRY_USER" "$REGISTRY_PASS"
        --export-binaries="$BINARY_CACHE_PATH" --network-type="$HIVE_NETWORK_TYPE"
    - chmod -Rc a+rwx "$BINARY_CACHE_PATH"
    - ls -la $BINARY_CACHE_PATH/*

  artifacts:
    reports:
      dotenv: docker_image_name.env
    paths:
      - $BINARY_CACHE_PATH/*
      - ./docker_image_name.env

.prepare_hived_data_5m:
  extends: .docker_image_builder_job
  tags:
    - fastest

  variables:
    SUBMODULE_DIR: "$CI_PROJECT_DIR"
    SCRIPTS_PATH: "$SUBMODULE_DIR/scripts"
    BLOCK_LOG_SOURCE_DIR: ""
    CONFIG_INI_SOURCE: ""
    HIVE_NETWORK_TYPE: mainnet
    DATA_CACHE_DIR: "${DATA_CACHE_HIVE_PREFIX}_${HIVED_COMMIT}"
    # NFS cache configuration
    CACHE_NFS_PATH: "/nfs/ci-cache"
    CACHE_LOCAL_PATH: "/cache"
  script:
    - |
      # Try to get cached data from NFS first
      CACHE_MANAGER="$SCRIPTS_PATH/ci-helpers/cache-manager.sh"
      CACHE_KEY="${HIVED_COMMIT}"

      if [[ -x "$CACHE_MANAGER" ]] && "$CACHE_MANAGER" get hive "$CACHE_KEY" "${DATA_CACHE_DIR}"; then
        echo "Cache hit for HIVED commit $CACHE_KEY"
        # Ensure hived_uid.env exists
        if [[ ! -f "${DATA_CACHE_DIR}/datadir/hived_uid.env" ]]; then
          echo "HIVED_UID=$(id -u)" > "${DATA_CACHE_DIR}/datadir/hived_uid.env"
        fi
      else
        echo "Cache miss for HIVED commit $CACHE_KEY - performing replay"
        mkdir "${DATA_CACHE_DIR}/datadir" -pv
        cd "${DATA_CACHE_DIR}/datadir"
        flock "${DATA_CACHE_DIR}/datadir" $SCRIPTS_PATH/ci-helpers/build_data.sh $HIVED_IMAGE_NAME \
          --data-cache="${DATA_CACHE_DIR}" --block-log-source-dir="$BLOCK_LOG_SOURCE_DIR" \
          --config-ini-source="$CONFIG_INI_SOURCE"
        cd "$CI_PROJECT_DIR"

        # Push to NFS cache for future use
        if [[ -x "$CACHE_MANAGER" ]]; then
          "$CACHE_MANAGER" put hive "$CACHE_KEY" "${DATA_CACHE_DIR}" || echo "Warning: Failed to push to NFS cache"
        fi
      fi
    - cp "${DATA_CACHE_DIR}/datadir/hived_uid.env" "$CI_PROJECT_DIR/hived_uid.env"
    - cp "${DATA_CACHE_DIR}/datadir/docker_entrypoint.log" "${CI_PROJECT_DIR}/docker_entrypoint.log" 2>/dev/null || true
    - ls -la "${DATA_CACHE_DIR}/datadir/"
  after_script:
    - rm "${DATA_CACHE_DIR}/replay_running" -f

  artifacts:
    reports:
      dotenv:
        - docker_image_name.env
        - hived_uid.env
    paths:
      - docker_entrypoint.log
