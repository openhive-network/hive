[build-system]
requires = ["poetry-core==2.1.3"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
requires-poetry = "2.1.3"
name = "api_generation"
version = "0.0.0"
description = ""
authors = []

source = [
    { name = "PyPI", priority = "primary" },
    { name = "gitlab-hive", url = "https://gitlab.syncad.com/api/v4/groups/136/-/packages/pypi/simple", priority = "primary" },
]


[tool.poetry.dependencies]
python = ">=3.14,<4"
toml = "^0.10.2"
jinja2 = "^3.1.6"
hiveio-beekeepy = "^1.28.6-post.0"  # This version is copied to generated API packages
hiveio-api-client-generator = {version = "1.7.1.dev20260305084231", source = "gitlab-hive"}
