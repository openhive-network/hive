[build-system]
requires = [
    "poetry-core==2.1.3",
    "poetry-dynamic-versioning>=1.0.0,<2.0.0",
]
build-backend = "poetry_dynamic_versioning.backend"


[tool.poetry]
requires-poetry = "2.1.3"
name = "api_generation"
version = "0.0.0"
description = ""
authors = []

source = [
    { name = "PyPI", priority = "primary" },
    { name = "gitlab-hive", url = "https://gitlab.syncad.com/api/v4/groups/136/-/packages/pypi/simple", priority = "primary" },
]


[tool.poetry.dependencies]
python = ">=3.14,<4"
toml = "^0.10.2"
jinja2 = "^3.1.6"
hiveio-beekeepy = "^1.28.6"  # This version is copied to generated API packages
hiveio-api-client-generator = "^1.7.1"
