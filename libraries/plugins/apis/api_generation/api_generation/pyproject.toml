[build-system]
requires = [
    "poetry-core>=1.7.0",
    "poetry-dynamic-versioning>=1.0.0,<2.0.0",
]
build-backend = "poetry_dynamic_versioning.backend"


[tool.poetry]
name = "api_generation"
version = "0.0.0"
description = ""
authors = []

source = [
    { name = "PyPI", priority = "primary" },
    { name = "gitlab-schemas", url = "https://gitlab.syncad.com/api/v4/projects/362/packages/pypi/simple", priority = "supplemental" },
    { name = "gitlab-beekeepy", url = "https://gitlab.syncad.com/api/v4/projects/558/packages/pypi/simple", priority = "supplemental" },
    { name = "gitlab-api_client_generator", url = "https://gitlab.syncad.com/api/v4/projects/484/packages/pypi/simple", priority = "supplemental" },
]


[tool.poetry.dependencies]
python = ">=3.14,<4"
toml = "0.10.2"
jinja2 = "3.1.6"
hiveio-beekeepy = "1.28.5.post20260202151849"  # This version is copied to generated API packages
api_client_generator = ">=1.7.1.dev20"  # Includes fix for UnionType handling
