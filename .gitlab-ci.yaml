stages:
- static_code_analysis
- build
- test
- cleanup
- publish
- deploy

variables:
  PYTEST_NUMBER_OF_PROCESSES: 8

  # Docker image tags from common-ci-configuration with util-linux for NFS flock support
  DOCKER_BUILDER_TAG: "3dd346380da7f28cdaf3ef3955559c905d94bd1c"
  DOCKER_DIND_TAG: "3dd346380da7f28cdaf3ef3955559c905d94bd1c"

  # Fetch strategy reuses workspace between jobs, reducing GitLab server load.
  # Full clone (depth 0) enables efficient incremental fetches - shallow clones
  # don't reduce server CPU and make fetch less effective.
  GIT_STRATEGY: fetch
  GIT_DEPTH: 0
  GIT_SUBMODULE_DEPTH: 0
  GIT_SUBMODULE_STRATEGY: recursive
  # Temporary: separate clone path prevents clone-strategy jobs from erasing
  # fetch workspaces during transition. Remove once all projects use fetch.
  GIT_CLONE_PATH: $CI_BUILDS_DIR/fetch/$CI_RUNNER_SHORT_TOKEN/$CI_CONCURRENT_ID/$CI_PROJECT_PATH
  CI_DEBUG_SERVICES: "true"

  # Versions of Python packages
  PYTHON_JUNIT_XML_VERSION: "1.9"
  PYTHON_DATEUTIL_VERSION: "2.8.2"

  DATA_CACHE_HIVE_PREFIX: "/nfs/ci-cache/hive/replay_data_hive"
  DATA_CACHE_HIVE_CLEANUP_PATTERN: "/nfs/ci-cache/hive/replay_data_hive_*"
  BLOCK_LOG_SOURCE_DIR_5M: /blockchain/block_log_5m

  # sccache distributed compiler cache (Redis backend on builder-10)
  SCCACHE_REDIS: "redis://192.168.50.109:6379"
  SCCACHE_CACHE_SIZE: "50G"
  BLOCK_LOG_SOURCE_DIR_MIRRORNET_5M: /blockchain/block_log_5m_mirrornet

  # Variables required by the mirrornet pipeline
  TEST_TOOLS_VALIDATE_RESPONSE_SCHEMAS: "TRUE"

  # Quick Test Mode - uses cached binaries from previous pipeline, runs only unit tests by default
  # Usage: Set QUICK_TEST=true to skip builds and run only chain_test/plugin_test
  # Optionally set QUICK_TEST_BINARY_COMMIT to use a specific commit's binaries
  # Optionally set QUICK_TEST_JOBS to run additional specific jobs (comma-separated)
  # Optionally set QUICK_TEST_BLOCK_LOG_IMAGE to use a cached test block log image for test_tools_tests
  QUICK_TEST: "false"
  QUICK_TEST_BINARY_COMMIT: ""
  QUICK_TEST_JOBS: ""
  QUICK_TEST_BLOCK_LOG_IMAGE: ""

  # Python 3.14 compatibility - allow PyO3-based packages to build
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

  # Set to "true" to run poetry update and test with latest dependency versions
  TEST_WITH_LATEST_DEPENDENCIES: "false"
  STATIC_ANALYSIS_WITH_LATEST_DEPENDENCIES: "false"

include:
  - template: Workflows/Branch-Pipelines.gitlab-ci.yml
  # needed to point TEST_IMAGE_TAG
  - local: '/scripts/ci-helpers/ci_image_tag_vars.yml'
  - local: '/scripts/ci-helpers/prepare_data_image_job.yml'
  - local: '/scripts/ci-helpers/mirrornet_jobs.gitlab-ci.yml'
  - local: '/scripts/ci-helpers/extended_block_log_creation.gitlab-ci.yml'
  # Skip rules for docs-only changes optimization
  - local: '/scripts/ci-helpers/skip_rules.yml'
  - local: '/scripts/ci-helpers/common_includes.yml'
  - local: '/scripts/ci-helpers/hiveio_api_package.gitlab-ci.yml'

default:
  hooks:
    pre_get_sources_script: !reference [.pre_get_sources_with_submodules, pre_get_sources_script]

prepare_hived_image:
  extends:
    - .prepare_hived_image
    - .skip_build_on_docs_only_with_quick_test
  stage: build
  needs:
    - job: detect_changes
      optional: true  # Not needed on protected branches
  variables:
    REGISTRY_USER: "$HIVED_CI_IMGBUILDER_USER"
    REGISTRY_PASS: $HIVED_CI_IMGBUILDER_PASSWORD
    BINARY_CACHE_PATH: "$CI_PROJECT_DIR/hived-binaries"
    HIVE_NETWORK_TYPE: mainnet
  tags:
    - bigjob
  after_script:
    - |
      source docker_image_name.env
      echo "Adding latest/stable/version tags for mainnet image..."
      # Pull image to local daemon (may not be loaded when using cached builds)
      docker pull $HIVED_INSTANCE || echo "Warning: docker pull failed"
      docker images
      if [[ "$CI_COMMIT_BRANCH" == "develop" ]]; then
        docker tag $HIVED_INSTANCE ${CI_REGISTRY_IMAGE}:latest
        docker push ${CI_REGISTRY_IMAGE}:latest
      elif [[ "$CI_COMMIT_BRANCH" == "master" ]]; then
        docker tag $HIVED_INSTANCE ${CI_REGISTRY_IMAGE}:stable
        docker push ${CI_REGISTRY_IMAGE}:stable
      fi
      if [[ -n "$CI_COMMIT_TAG" && "$CI_COMMIT_REF_PROTECTED" == "true" ]]; then
        docker tag $HIVED_INSTANCE ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}
        docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}
      fi

prepare_hived_data:
  extends:
    - .prepare_hived_data_5m
    - .manual_on_feature_branches_skip_tests_only  # Manual on feature branches, auto on develop/master
  needs:
    - job: detect_changes
      optional: true  # Not needed on protected branches
    - job: prepare_hived_image
      artifacts: true
      optional: true  # Not needed if build was skipped
  stage: build
  variables:
    HIVE_NETWORK_TYPE: mainnet
    BLOCK_LOG_SOURCE_DIR: $BLOCK_LOG_SOURCE_DIR_5M
    CONFIG_INI_SOURCE: "$CI_PROJECT_DIR/docker/config_5M.ini"
  tags:
    - public-runner-docker
    - data-cache-storage
    - fastest

cleanup_hived_cache_manual:
  extends: .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "$DATA_CACHE_HIVE_CLEANUP_PATTERN"
  tags:
    - public-runner-docker
    - data-cache-storage

cleanup_cache_on_hived_builders:
  extends: .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "$DATA_CACHE_HIVE_CLEANUP_PATTERN"
  tags:
    - public-runner-docker

cleanup_old_hived_cache:
  extends: .cleanup_old_cache_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "$DATA_CACHE_HIVE_CLEANUP_PATTERN"
  tags:
    - public-runner-docker
    - data-cache-storage


testnet_node_build:
  extends:
    - .prepare_hived_image
    - .skip_build_on_docs_only_with_quick_test
  stage: build
  needs:
    - job: detect_changes
      optional: true  # Not needed on protected branches
  variables:
    REGISTRY_USER: "$HIVED_CI_IMGBUILDER_USER"
    REGISTRY_PASS: $HIVED_CI_IMGBUILDER_PASSWORD
    BINARY_CACHE_PATH: "$CI_PROJECT_DIR/hived-testnet-binaries"
    HIVE_NETWORK_TYPE: testnet
  artifacts:
    paths:
      - "$BINARY_CACHE_PATH"
  tags:
    - bigjob
  after_script:
    - |
      source docker_image_name.env
      echo "Adding latest/stable/version tags for testnet image..."
      # Pull image to local daemon (may not be loaded when using cached builds)
      docker pull $HIVED_INSTANCE || echo "Warning: docker pull failed"
      docker images
      IMAGE_NAME_PREFIX="${CI_REGISTRY_IMAGE}/testnet:"
      if [[ "$CI_COMMIT_BRANCH" == "develop" ]]; then
        docker tag $HIVED_INSTANCE ${IMAGE_NAME_PREFIX}latest
        docker push ${IMAGE_NAME_PREFIX}latest
      elif [[ "$CI_COMMIT_BRANCH" == "master" ]]; then
        docker tag $HIVED_INSTANCE ${IMAGE_NAME_PREFIX}stable
        docker push ${IMAGE_NAME_PREFIX}stable
      fi
      if [[ -n "$CI_COMMIT_TAG" && "$CI_COMMIT_REF_PROTECTED" == "true" ]]; then
        docker tag $HIVED_INSTANCE ${IMAGE_NAME_PREFIX}${CI_COMMIT_TAG}
        docker push ${IMAGE_NAME_PREFIX}${CI_COMMIT_TAG}
      fi

generate-wax-spec:
  extends: .generate_swagger_package
  stage: build
  rules:
    # Run in QUICK_TEST mode if this job or test-wax-spec-package is requested
    - if: $QUICK_TEST == "true" && $QUICK_TEST_JOBS =~ /wax-spec/
      when: on_success
    - if: $QUICK_TEST == "true"
      when: never
    - when: on_success
  variables:
    INPUT_JSON_SWAGGER_FILE: "${CI_PROJECT_DIR}/libraries/plugins/apis/documentation/openapi.json"
    NAMESPACE: "" # Leave empty not to disable generation of nested API structure
    NPM_PACKAGE_SCOPE: "@hiveio"
    NPM_PACKAGE_NAME: "wax-api-jsonrpc"
    API_TYPE: "jsonrpc"
  tags:
    - public-runner-docker

mirrornet_node_build:
  stage: build
  extends:
    - .prepare_hived_image
    - .skip_build_on_docs_only_with_quick_test
  needs:
    - job: detect_changes
      optional: true  # Not needed on protected branches
  variables:
    REGISTRY_USER: "$HIVED_CI_IMGBUILDER_USER"
    REGISTRY_PASS: $HIVED_CI_IMGBUILDER_PASSWORD
    BINARY_CACHE_PATH: "$CI_PROJECT_DIR/hived-mirrornet-binaries"
    HIVE_NETWORK_TYPE: mirrornet
  tags:
    - bigjob
  after_script:
    - |
      source docker_image_name.env
      echo "Adding latest/stable/version tags for mirrornet image..."
      # Pull image to local daemon (may not be loaded when using cached builds)
      docker pull $HIVED_INSTANCE || echo "Warning: docker pull failed"
      docker images
      IMAGE_NAME_PREFIX="${CI_REGISTRY_IMAGE}/mirrornet:"
      if [[ "$CI_COMMIT_BRANCH" == "develop" ]]; then
        docker tag $HIVED_INSTANCE ${IMAGE_NAME_PREFIX}latest
        docker push ${IMAGE_NAME_PREFIX}latest
      elif [[ "$CI_COMMIT_BRANCH" == "master" ]]; then
        docker tag $HIVED_INSTANCE ${IMAGE_NAME_PREFIX}stable
        docker push ${IMAGE_NAME_PREFIX}stable
      fi
      if [[ -n "$CI_COMMIT_TAG" && "$CI_COMMIT_REF_PROTECTED" == "true" ]]; then
        docker tag $HIVED_INSTANCE ${IMAGE_NAME_PREFIX}${CI_COMMIT_TAG}
        docker push ${IMAGE_NAME_PREFIX}${CI_COMMIT_TAG}
      fi

extended_block_log_creation:
  extends: .extended_block_log_creation
  stage: build
  needs:
    - job: detect_changes
      optional: true  # Not needed on protected branches
    - job: "mirrornet_node_build"
      artifacts: true
      optional: true  # Not needed if build was skipped
  variables:
    REGISTRY: "${CI_REGISTRY_IMAGE}"
    IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
    HIVE_SRC: "${CI_PROJECT_DIR}"
    HIVE_COMMIT: "${CI_COMMIT_SHORT_SHA}"
    # Use local block_log - all CI runners mount /blockchain read-only via services_volumes
    BLOCK_LOG_SOURCE_DIR: "$BLOCK_LOG_SOURCE_DIR_5M"
    BINARY_PATH: "${CI_PROJECT_DIR}/hived-mirrornet-binaries"
  rules:
    - if: $QUICK_TEST == "true"
      when: never
    - if: $TESTS_ONLY == "true"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "master"
      when: never
    # Skip if only docs changed
    - if: $CI_COMMIT_BRANCH
      changes:
        paths:
          - libraries/**/*
          - programs/**/*
          - CMakeLists.txt
          - cmake/**/*
          - Dockerfile
          - docker/**/*
          - contrib/**/*
          - scripts/ci-helpers/**/*
          - .gitlab-ci.yaml
      when: always
    - when: never
  tags:
    - public-runner-docker
    - data-cache-storage

mirrornet_replay_test:
  extends:
    - .job-defaults
    - .manual_on_feature_branches  # Manual on feature branches (converts and replays 5M blocks)
  stage: test
  image: "$CI_BASE_IMAGE"
  needs:
    - job: "mirrornet_node_build"
      artifacts: true
      optional: true  # Not needed if build was skipped

  variables:
    BINARIES_DIR: "hived-mirrornet-binaries"
    SCRIPTS_PATH: "$CI_PROJECT_DIR/scripts"
    # Use local block_log - all CI runners mount /blockchain read-only via services_volumes
    BLOCK_LOG_SOURCE_DIR: "$BLOCK_LOG_SOURCE_DIR_5M"
    NUMBER_OF_BLOCKS: 5000000
    MIRRORNET_WORKING_DIR: "$CI_PROJECT_DIR/mirrornet"
    MIRRORNET_BLOCKCHAIN_DATA_DIR: "$MIRRORNET_WORKING_DIR/mirrornet_blockchain_data"
    MIRRORNET_SOURCE_5M_DATA_DIR: "$MIRRORNET_WORKING_DIR/source_5m"
    MAINNET_TRUNCATED_DIR: "$CI_PROJECT_DIR/mainnet"
    CONFIG_INI_SOURCE: "$CI_PROJECT_DIR/docker/config_mirrornet_5M.ini"
  before_script:
    - export NUMBER_OF_PROCESSES=8
    - mkdir -p "$MAINNET_TRUNCATED_DIR"
    - mkdir -p "$MIRRORNET_SOURCE_5M_DATA_DIR"
    - mkdir -p "$MIRRORNET_SOURCE_5M_DATA_DIR/blockchain"
    - mkdir -p "$MIRRORNET_BLOCKCHAIN_DATA_DIR"
    - mkdir -p "$MIRRORNET_BLOCKCHAIN_DATA_DIR/blockchain"
    - cp "$CI_PROJECT_DIR/docker/config_mirrornet_5M.ini" "$MIRRORNET_WORKING_DIR/config.ini"
    # Copy monolithic block_log from local mount (no merge step needed)
    - cp "${BLOCK_LOG_SOURCE_DIR}/block_log" "$MIRRORNET_SOURCE_5M_DATA_DIR/blockchain/"
    - cp "${BLOCK_LOG_SOURCE_DIR}/block_log.artifacts" "$MIRRORNET_SOURCE_5M_DATA_DIR/blockchain/"
    - ls -la "$MIRRORNET_SOURCE_5M_DATA_DIR/blockchain/"
    - cd "$BINARIES_DIR"
  script:
    - echo "Compressing block log to $NUMBER_OF_BLOCKS blocks with $NUMBER_OF_PROCESSES processes"
    - time ./compress_block_log
      -i "$MIRRORNET_SOURCE_5M_DATA_DIR/blockchain/block_log"
      -o "$MAINNET_TRUNCATED_DIR/block_log"
      --decompress
      -n $NUMBER_OF_BLOCKS
      --jobs $NUMBER_OF_PROCESSES
    - echo "Converting block log to mirrornet format with $NUMBER_OF_PROCESSES processes"
    - time ./blockchain_converter
      --plugin block_log_conversion
      -i "$MAINNET_TRUNCATED_DIR/block_log"
      -o "$MIRRORNET_BLOCKCHAIN_DATA_DIR/blockchain/block_log"
      --chain-id $MIRRORNET_CHAIN_ID
      --private-key "$MIRRORNET_SKELETON_KEY"
      --use-same-key
      --jobs $NUMBER_OF_PROCESSES
    - echo "Starting hived replay"
    - ./hived
      --block-log-split=-1
      -d "$MIRRORNET_BLOCKCHAIN_DATA_DIR"
      --chain-id $MIRRORNET_CHAIN_ID
      --skeleton-key "$MIRRORNET_SKELETON_KEY"
      --set-benchmark-interval 100000
      --force-replay
      --validate-during-replay
      --stop-at-block $NUMBER_OF_BLOCKS
      --exit-before-sync | tee hived-replay.log
    # Push generated mirrornet block_log to NFS cache for HAF CI using cache-manager
    # Uses tar archive for atomic writes and metadata tracking
    - echo "Pushing mirrornet block_log to NFS cache..."
    - |
      # Fetch cache-manager from common-ci-configuration
      CACHE_MANAGER="/tmp/cache-manager.sh"
      curl -fsSL "https://gitlab.syncad.com/hive/common-ci-configuration/-/raw/develop/scripts/cache-manager.sh" -o "$CACHE_MANAGER"
      chmod +x "$CACHE_MANAGER"
      "$CACHE_MANAGER" put hive block_log_5m_mirrornet "$MIRRORNET_BLOCKCHAIN_DATA_DIR/blockchain" || echo "Warning: cache-manager put failed"
    - ls -lAh /nfs/ci-cache/hive/
  artifacts:
    paths:
      - "$BINARIES_DIR/*.log"
  tags:
    - public-runner-docker
    - data-cache-storage

.unit_tests_base:
  extends:
    - .job-defaults
    - .skip_test_on_docs_only
  stage: test
  needs:
    - job: testnet_node_build
      artifacts: true
      optional: true  # Not required in QUICK_TEST mode or docs-only changes
    - job: quick_test_setup
      artifacts: true
      optional: true  # Not required in normal mode
  image: "$CI_BASE_IMAGE"
  variables:
    GIT_STRATEGY: none
    FF_NETWORK_PER_BUILD: "true"
  tags:
    - public-runner-docker

chain_test:
  extends: .unit_tests_base
  script:
    - curl -fsSL "${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/raw/${CI_COMMIT_SHA}/scripts/run_chain_tests_parallel.sh" -o run_chain_tests_parallel.sh
    - chmod +x run_chain_tests_parallel.sh
    - ./run_chain_tests_parallel.sh ./hived-testnet-binaries/chain_test 6
  artifacts:
    reports:
      junit: hived-testnet-binaries/chain_test_results.xml
    paths:
      - hived-testnet-binaries/chain_test.log
      - hived-testnet-binaries/chain_test_parallel.log
      - hived-testnet-binaries/chain_test_list.txt
      - hived-testnet-binaries/chain_test_logs/
    when: always
    expire_in: 1 week

# Split plugin_test into two parallel jobs:
# - witness_tests uses real-time block production (slow, ~15 min)
# - other suites use debug_generate_blocks (fast, ~5 min)

plugin_test_witness:
  extends: .unit_tests_base
  script:
    - timeout 20m ./hived-testnet-binaries/plugin_test --run_test=witness_tests --log_format=JUNIT --log_sink=plugin_test_witness_results.xml --log_level=error > plugin_test_witness.log 2>&1
  artifacts:
    reports:
      junit: plugin_test_witness_results.xml
    paths:
      - plugin_test_witness.log
    when: always
    expire_in: 1 week

plugin_test_api:
  extends: .unit_tests_base
  script:
    - timeout 10m ./hived-testnet-binaries/plugin_test --run_test=!witness_tests --log_format=JUNIT --log_sink=plugin_test_api_results.xml --log_level=error > plugin_test_api.log 2>&1
  artifacts:
    reports:
      junit: plugin_test_api_results.xml
    paths:
      - plugin_test_api.log
    when: always
    expire_in: 1 week

# Verify binaries are statically linked (except for expected glibc dependencies)
# This ensures binaries are portable across Linux distributions
static_linking_check:
  extends:
    - .job-defaults
    - .skip_test_on_docs_only
  stage: test
  needs:
    - job: prepare_hived_image
      artifacts: true
  image: "$CI_BASE_IMAGE"
  script:
    - |
      # Check main binaries for correct static linking
      BINARIES=(
        hived-binaries/hived
        hived-binaries/cli_wallet
      )

      # Filter to only existing binaries (some may not be built in all configurations)
      EXISTING_BINARIES=()
      for bin in "${BINARIES[@]}"; do
        if [[ -f "$bin" ]]; then
          EXISTING_BINARIES+=("$bin")
        else
          echo "Note: $bin not found, skipping"
        fi
      done

      if [[ ${#EXISTING_BINARIES[@]} -eq 0 ]]; then
        echo "ERROR: No binaries found to check"
        exit 1
      fi

      $CI_PROJECT_DIR/scripts/check-static-linking.sh "${EXISTING_BINARIES[@]}"
  tags:
    - public-runner-docker

.hived-service: &hived-service
  - name: $HIVED_IMAGE_NAME
    alias: hived-instance
    variables:
      DATA_SOURCE: "${DATA_CACHE_HIVE_PREFIX}_${HIVED_COMMIT}"
      LOG_FILE: $CI_JOB_NAME.log
    command: ["--replay-blockchain", "--stop-at-block=5000000"]

# Wait for hived service to be ready with retry loop
# Usage: !reference [.wait-for-hived, script]
.wait-for-hived:
  script:
    - |
      HIVED_ENDPOINT="${NODE_ADDRESS:-hived-instance:8091}"
      echo "Waiting for hived at ${HIVED_ENDPOINT} to be ready..."
      for i in $(seq 1 60); do
        if curl -sI "${HIVED_ENDPOINT}" >/dev/null 2>&1; then
          echo "Connected to hived on attempt $i"
          exit 0
        fi
        echo "Waiting for hived... attempt $i/60"
        sleep 2
      done
      echo "ERROR: hived not ready after 60 retries (2 minutes)"
      exit 1

.test-block-log-service:
  variables:
    TEST_BLOCK_LOG_SERVER: "http://test-block-log-server:80"
  services:
    - name: $TEST_BLOCK_LOG_LATEST_VERSION_IMAGE
      alias: test-block-log-server

.python_based:
  image: "$CI_BASE_IMAGE"
  extends:
    - .project_develop_configuration_template
  before_script:
    - cd $CI_PROJECT_DIR/tests/python/hive-local-tools
    - !reference [.project_develop_configuration_template, before_script]
    - cd $CI_PROJECT_DIR

.python_static_analysis_configuration:
  extends: .python_based
  needs: []  # to run immediately without waiting for previous jobs
  variables:
    PACKAGES_TO_CHECK: "$CI_PROJECT_DIR/tests/python/hive-local-tools" # temporary until test code will be cleaned up in further MRs
    PYPROJECT_CONFIG_PATH: "$CI_PROJECT_DIR/tests/python/hive-local-tools/pyproject.toml"
    PRE_COMMIT_CONFIG: "$CI_PROJECT_DIR/tests/python/hive-local-tools/.pre-commit-config.yaml"
    PYPROJECT_DIR: "$CI_PROJECT_DIR/tests/python/hive-local-tools"
    # Only clone test-related submodules (skip rocksdb, zstd, fc, appbase, compression_dictionaries)
    GIT_SUBMODULE_PATHS: "tests/python/hive-local-tools/tests_api"
  before_script:
    - !reference [.python_based, before_script]
    - !reference [.update_deps_for_static_analysis, script]
    - cd $CI_PROJECT_DIR/tests/python/hive-local-tools
  tags:
    - public-runner-docker

pre_commit_checks:
  stage: static_code_analysis
  variables:
    POETRY_INSTALL_ARGS: --only pre-commit
  extends:
    - .pre_commit_checks_template
    - .python_static_analysis_configuration
  artifacts:
    paths:
      - tests/python/hive-local-tools/poetry.lock

verify_hive_local_tools_poetry_lock_stability:
  stage: static_code_analysis
  extends: .verify_poetry_lock_stability_template
  variables:
    PYPROJECT_DIR: "$CI_PROJECT_DIR/tests/python/hive-local-tools"
  tags:
    - public-runner-docker

verify_api_generation_poetry_lock_stability:
  stage: static_code_analysis
  extends: .verify_poetry_lock_stability_template
  variables:
    PYPROJECT_DIR: "$CI_PROJECT_DIR/libraries/plugins/apis/api_generation/api_generation"
  tags:
    - public-runner-docker

# Detect what type of files changed to enable test-only optimization
# Sets TESTS_ONLY=true when only test files changed (no source code)
detect_changes:
  extends: .detect_changes
  tags:
    - public-runner-docker

# Quick Test Setup - retrieves cached binaries from previous successful pipeline
# Runs when QUICK_TEST=true (manual) or TESTS_ONLY=true (auto-detected)
quick_test_setup:
  extends:
    - .docker_image_builder_job
    - .quick_test_setup_rules
  stage: static_code_analysis
  needs:
    - job: detect_changes
      optional: true  # Not needed on protected branches or when QUICK_TEST is set
  variables:
    GIT_STRATEGY: clone
    REGISTRY_USER: "$HIVED_CI_IMGBUILDER_USER"
    REGISTRY_PASS: $HIVED_CI_IMGBUILDER_PASSWORD
  script:
    - ./scripts/ci-helpers/quick-test-setup.sh
  artifacts:
    paths:
      - hived-testnet-binaries/
    reports:
      dotenv: quick_test.env
    expire_in: 1 day

.pytest_based:
  extends: .python_based
  variables:
    PYPROJECT_DIR: "$CI_PROJECT_DIR/tests/python/hive-local-tools"
    # Only clone test-related submodules (skip rocksdb, zstd, fc, appbase, compression_dictionaries)
    GIT_SUBMODULE_PATHS: "tests/python/hive-local-tools/tests_api"
  before_script:
    - !reference [.python_based, before_script]
    - !reference [.update_deps_for_tests, script]
  after_script:
    - |
      shopt -s globstar
      tar --exclude='**/generated_during_*/**/block_log*' --exclude='**/generated_during_*/**/shared_memory.bin' --exclude='**/generated_during_*/**/*.sst' -cf - **/generated_during_* | 7z a -si generated_during.tar.7z
      tar -cf - **/generated_by_package_fixtures | 7z a -si generated_by_package_fixtures.tar.7z
  artifacts:
    reports:
      junit: $PYTEST_JUNIT_REPORT
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_NAME"
    paths:
      - "generated_during.tar.7z"
      - "generated_by_package_fixtures.tar.7z"
    when: always
