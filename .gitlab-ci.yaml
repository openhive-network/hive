# Build and push OpenAPI spec Docker image
build_openapi_spec_image:
  extends: .docker_image_builder_job
  stage: build
  variables:
    OPENAPI_IMAGE_NAME: "openapi-spec"
    OPENAPI_DOCKERFILE_PATH: "libraries/plugins/apis/documentation/Dockerfile"
    OPENAPI_BUILD_CONTEXT: "libraries/plugins/apis/documentation"
    GIT_SUBMODULE_STRATEGY: "none"
  script:
    # Login to GitLab registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin

    # Determine API version from git and build image
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        API_VERSION="$CI_COMMIT_TAG"
      else
        API_VERSION=$(git describe --tags 2>/dev/null || echo "$CI_COMMIT_SHORT_SHA")
      fi
      echo "API version: $API_VERSION"

      if [ -n "$CI_COMMIT_TAG" ] && [[ "$CI_COMMIT_TAG" =~ ^[01v].* ]]; then
        echo "This is a protected version tag: $CI_COMMIT_TAG"

        # Login to registry.hive.blog for versioned releases
        echo "$BLOG_REGISTRY_PASSWORD" | docker login -u "$BLOG_REGISTRY_USER" "registry.hive.blog" --password-stdin

        # Build and push to multiple registries with multiple tags in one command
        docker buildx build \
          --file "$OPENAPI_DOCKERFILE_PATH" \
          --build-arg API_VERSION="$API_VERSION" \
          --cache-from "type=registry,ref=$CI_REGISTRY_IMAGE/$OPENAPI_IMAGE_NAME:cache" \
          --cache-to "type=registry,mode=max,ref=$CI_REGISTRY_IMAGE/$OPENAPI_IMAGE_NAME:cache" \
          --provenance=false \
          --tag "$CI_REGISTRY_IMAGE/$OPENAPI_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" \
          --tag "$CI_REGISTRY_IMAGE/$OPENAPI_IMAGE_NAME:$CI_COMMIT_TAG" \
          --tag "registry.hive.blog/hive/$OPENAPI_IMAGE_NAME:$CI_COMMIT_TAG" \
          --push \
          "$OPENAPI_BUILD_CONTEXT"
      else
        # Build and push with commit SHA tag only
        docker buildx build \
          --file "$OPENAPI_DOCKERFILE_PATH" \
          --build-arg API_VERSION="$API_VERSION" \
          --cache-from "type=registry,ref=$CI_REGISTRY_IMAGE/$OPENAPI_IMAGE_NAME:cache" \
          --cache-to "type=registry,mode=max,ref=$CI_REGISTRY_IMAGE/$OPENAPI_IMAGE_NAME:cache" \
          --provenance=false \
          --tag "$CI_REGISTRY_IMAGE/$OPENAPI_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" \
          --push \
          "$OPENAPI_BUILD_CONTEXT"

        if [ -n "$CI_COMMIT_TAG" ]; then
          echo "Tag $CI_COMMIT_TAG does not match protected version patterns, skipping version tagging"
        fi
      fi
  tags:
    - public-runner-docker

