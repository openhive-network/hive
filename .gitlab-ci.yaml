# OOM Fix Test - Memory-aware build.sh
# Tests that build.sh correctly limits parallel jobs based on available memory

stages:
  - build

variables:
  GIT_DEPTH: 15
  GIT_SUBMODULE_DEPTH: 1
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive

# Test the memory-aware build on builder-11 (60GB RAM)
testnet_node_build:
  stage: build
  image: "${CI_REGISTRY_IMAGE}/ci-base-image:ubuntu24.04-3"
  variables:
    HIVE_BUILD_ROOT_PATH: "${CI_PROJECT_DIR}/build"
  script:
    - echo "=== Memory Info ==="
    - free -h
    - cat /proc/meminfo | grep -E "MemTotal|MemAvailable"
    - echo "=== Starting build with memory-aware job scaling ==="
    - |
      ./scripts/build.sh \
        --source-dir="${CI_PROJECT_DIR}" \
        --binary-dir="${HIVE_BUILD_ROOT_PATH}" \
        --cmake-arg="-DBUILD_HIVE_TESTNET=ON" \
        --cmake-arg="-DENABLE_SMT_SUPPORT=OFF" \
        --cmake-arg="-DHIVE_CONVERTER_BUILD=OFF" \
        --cmake-arg="-DHIVE_LINT=OFF"
  tags:
    - hive-builder-11
    - build-testnet
