.fetch_test_block_logs:
  # Usage:
  # 1. Add - !reference [.fetch_test_block_logs, script] at the beginning of your test script section.
  # 2. Set the appropriate values for:
  #    - TEST_BLOCK_LOG_LATEST_VERSION_IMAGE or QUICK_TEST_BLOCK_LOG_IMAGE (one required)
  #    - TEST_BLOCK_LOG_SERVER (required, should be set in .test-block-log-service)
  #    - TEST_BLOCK_LOGS_SOURCES (required, should be set in test job)
  #    - TESTING_BLOCK_LOGS_DESTINATION (required, should be set in test job)
  script:
    - |
      # Check that either TEST_BLOCK_LOG_LATEST_VERSION_IMAGE or QUICK_TEST_BLOCK_LOG_IMAGE is set
      if [[ -z "$TEST_BLOCK_LOG_LATEST_VERSION_IMAGE" ]] && [[ -z "$QUICK_TEST_BLOCK_LOG_IMAGE" ]]; then
        echo "ERROR: Either TEST_BLOCK_LOG_LATEST_VERSION_IMAGE or QUICK_TEST_BLOCK_LOG_IMAGE must be set"
        exit 1
      fi
      test -n "$TEST_BLOCK_LOG_SERVER"
      test -n "$TESTING_BLOCK_LOGS_DESTINATION"
      curl -I $TEST_BLOCK_LOG_SERVER || (echo "error connecting to service test-block-log-server" && false)
      IFS=" " read -ra BLOCK_LOGS <<< $TEST_BLOCK_LOGS_SOURCES
      for i in "${BLOCK_LOGS[@]}"
      do
        echo "$i"
        wget -q -nH -np -P $TESTING_BLOCK_LOGS_DESTINATION -r -R "index.html*" --cut-dirs=1 $TEST_BLOCK_LOG_SERVER/$i
      done

test_tools_tests:
  stage: test
  extends:
    - .test_tools_based
  rules:
    # Run in QUICK_TEST mode if requested in QUICK_TEST_JOBS AND block log image is provided
    - if: $QUICK_TEST == "true" && $QUICK_TEST_JOBS =~ /test_tools_tests/ && $QUICK_TEST_BLOCK_LOG_IMAGE
      when: on_success
    # Skip if QUICK_TEST mode but no block log image (prevents empty service name error)
    - if: $QUICK_TEST == "true" && $QUICK_TEST_JOBS =~ /test_tools_tests/
      when: never
    - if: $QUICK_TEST == "true"
      when: never
    - when: on_success
  needs:
    - job: testnet_node_build
      artifacts: true
      optional: true  # Not required in QUICK_TEST mode
    - job: quick_test_setup
      artifacts: true
      optional: true  # Not required in normal mode
    - job: build_combined_testing_block_logs_image
      artifacts: true
      optional: true  # Not required when using QUICK_TEST_BLOCK_LOG_IMAGE
  variables:
    PYTEST_TIMEOUT_MINUTES: 30
    PYTEST_JUNIT_REPORT: $CI_PROJECT_DIR/tests/python/test_tools_tests/report.xml
    TEST_BLOCK_LOGS_SOURCES: testing_block_logs/empty_block_logs/
    TESTING_BLOCK_LOGS_DESTINATION: $CI_PROJECT_DIR/testing_block_logs_dir/
    TEST_BLOCK_LOG_SERVER: "http://test-block-log-server:80"
    # Service image: In QUICK_TEST mode, QUICK_TEST_BLOCK_LOG_IMAGE must be set via pipeline variable
    # In normal mode, TEST_BLOCK_LOG_LATEST_VERSION_IMAGE comes from build_combined_testing_block_logs_image dotenv
    TEST_BLOCK_LOG_SERVICE_IMAGE: $TEST_BLOCK_LOG_LATEST_VERSION_IMAGE
  services:
    - name: $TEST_BLOCK_LOG_SERVICE_IMAGE
      alias: test-block-log-server
  before_script:
    # In QUICK_TEST mode, verify required images are available
    - |
      if [[ "$QUICK_TEST" == "true" && -z "$QUICK_TEST_BLOCK_LOG_IMAGE" ]]; then
        echo "ERROR: QUICK_TEST_BLOCK_LOG_IMAGE is required for test_tools_tests in QUICK_TEST mode"
        echo "Use: --variables QUICK_TEST_BLOCK_LOG_IMAGE:<image> or find one with list-hive-binaries.sh"
        exit 1
      fi
    - !reference [.test_tools_based, before_script]
  script:
    - mkdir -p "$TESTING_BLOCK_LOGS_DESTINATION"
    - !reference [.fetch_test_block_logs, script]
    - cd $CI_PROJECT_DIR/tests/python/test_tools_tests
    - pip install local-tools/
    - !reference [.run-pytest, script]
  tags:
    - public-runner-docker

