# Template for manual submodule fetching to reduce GitLab server load.
# Uses fetch-or-clone logic instead of bundled GIT_SUBMODULE_STRATEGY: recursive,
# which creates smaller, independent requests to Gitaly.
.fetch_test_submodules:
  variables:
    GIT_SUBMODULE_STRATEGY: none  # Don't use bundled submodule fetch
  before_script:
    # Fetch submodules script from common-ci-configuration
    - curl -fsSL "${CI_SERVER_URL}/hive/common-ci-configuration/-/raw/develop/scripts/fetch-submodules.sh" -o /tmp/fetch-submodules.sh
    - chmod +x /tmp/fetch-submodules.sh
    - /tmp/fetch-submodules.sh --parallel tests/python/hive-local-tools/tests_api
    # Then run the standard Python setup from .python_based
    - !reference [.python_based, before_script]
    # Run poetry update if TEST_WITH_LATEST_DEPENDENCIES is enabled
    - !reference [.update_deps_for_tests, script]

.test_tools_based:
  extends:
    - .pytest_based
    - .fetch_test_submodules
    - .skip_test_on_docs_only_with_quick_test
  # Default: skip in QUICK_TEST mode and on docs-only changes.
  # Jobs that support QUICK_TEST_JOBS override these rules.
  variables:
    HIVED_PATH: "$CI_PROJECT_DIR/hived-testnet-binaries/hived"
    CLI_WALLET_PATH: "$CI_PROJECT_DIR/hived-testnet-binaries/cli_wallet"
    GET_DEV_KEY_PATH: "$CI_PROJECT_DIR/hived-testnet-binaries/get_dev_key"
    BLOCK_LOG_UTIL_PATH: "$CI_PROJECT_DIR/hived-testnet-binaries/block_log_util"
    SST_DUMP_PATH: "$CI_PROJECT_DIR/hived-testnet-binaries/sst_dump"
    TEST_TOOLS_NODE_DEFAULT_WAIT_FOR_LIVE_TIMEOUT: "60"
  needs:
    - job: testnet_node_build
      artifacts: true
      optional: true  # Not needed if build was skipped (docs-only changes)

# Simple pytest job template for tests that only need:
# - PYTEST_DIR: directory containing tests (relative to CI_PROJECT_DIR)
# - PYTEST_TIMEOUT_MINUTES: test timeout
# Automatically sets PYTEST_JUNIT_REPORT based on PYTEST_DIR
.simple_pytest_job:
  stage: test
  extends: .test_tools_based
  variables:
    PYTEST_JUNIT_REPORT: $CI_PROJECT_DIR/${PYTEST_DIR}/report.xml
  script:
    - cd ${PYTEST_DIR}
    - !reference [.run-pytest, script]
  tags:
    - public-runner-docker

