deploy-wax-spec-dev-package:
  extends: .npm_deploy_package_template
  stage: publish

  before_script:
    # Fix paths FIRST, before npm_based_job_base does cd "${SOURCE_DIR}"
    # The dotenv artifact paths contain the build job's workspace which differs from this job
    - |
      if [[ -n "$PACKAGE_SOURCE_DIR" && "$PACKAGE_SOURCE_DIR" == /builds/* ]]; then
        RELATIVE_PATH="${PACKAGE_SOURCE_DIR#*/hive/hive/}"
        export SOURCE_DIR="${CI_PROJECT_DIR}/${RELATIVE_PATH}"
        echo "Transformed SOURCE_DIR to: $SOURCE_DIR"
      fi
      if [[ -n "$BUILT_PACKAGE_PATH" && "$BUILT_PACKAGE_PATH" == /builds/* ]]; then
        RELATIVE_PATH="${BUILT_PACKAGE_PATH#*/hive/hive/}"
        export PACKAGE_TGZ_PATH="${CI_PROJECT_DIR}/${RELATIVE_PATH}"
        echo "Transformed PACKAGE_TGZ_PATH to: $PACKAGE_TGZ_PATH"
      fi
    - !reference [.npm_based_job_base, before_script]
    - echo -e "\e[0Ksection_start:$(date +%s):package_tgz_unpack[collapsed=true]\r\e[0KAttempting to unpack ${PACKAGE_TGZ_PATH}"
    - cd "${CI_PROJECT_DIR}"
    - tar -xf "${PACKAGE_TGZ_PATH}" -C "${SOURCE_DIR}" --strip-components=1
    - echo -e "\e[0Ksection_end:$(date +%s):package_tgz_unpack\r\e[0K"

  variables:
    SOURCE_DIR: "${PACKAGE_SOURCE_DIR}"
    PACKAGE_TGZ_PATH: "${BUILT_PACKAGE_PATH}"
    NPM_PACKAGE_SCOPE: "@hiveio"
  needs:
    - job: test-wax-spec-package
    - job: generate-wax-spec
      artifacts: true
  tags:
  - public-runner-docker

