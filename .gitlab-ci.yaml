test-wax-spec-package:
  extends: .node_based_job_base
  stage: test
  rules:
    # Run in QUICK_TEST mode if requested in QUICK_TEST_JOBS
    - if: $QUICK_TEST == "true" && $QUICK_TEST_JOBS =~ /test-wax-spec-package/
      when: on_success
    - if: $QUICK_TEST == "true"
      when: never
    - when: on_success
  retry:
    max: 2
    when:
      - script_failure
  variables:
    WAX_TEST_DIR: "test-wax-spec"
    PACKAGE_TGZ_PATH: "${BUILT_PACKAGE_PATH}"
  script:
    # Fix BUILT_PACKAGE_PATH to use current job's workspace (path contains build job's workspace)
    - |
      if [[ -n "$BUILT_PACKAGE_PATH" && "$BUILT_PACKAGE_PATH" == /builds/* ]]; then
        RELATIVE_PATH="${BUILT_PACKAGE_PATH#*/hive/hive/}"
        PACKAGE_TGZ_PATH="${CI_PROJECT_DIR}/${RELATIVE_PATH}"
        echo "Transformed PACKAGE_TGZ_PATH to: $PACKAGE_TGZ_PATH"
      fi
    - mkdir -p "${WAX_TEST_DIR}"
    - cd "${WAX_TEST_DIR}"
    - npm init es6
    - echo "@hiveio:registry=https://gitlab.syncad.com/api/v4/groups/136/-/packages/npm/" >> .npmrc
    - pnpm add typescript @hiveio/wax @hiveio/wax-api-jsonrpc@file:${PACKAGE_TGZ_PATH} # Install dependencies
    - |
      cat <<EOT > "index.ts"
      import WaxExtendedData from '@hiveio/wax-api-jsonrpc';
      import { createHiveChain } from '@hiveio/wax';
      const chainExtended = (await createHiveChain()).extend(WaxExtendedData);
      console.log(await chainExtended.api.block_api.get_block_range({ starting_block_num: 1, count: 10 }));
      EOT
    - pnpm exec tsc -t esnext -m esnext --moduleResolution bundler index.ts # Test if it compiles
    - node index.js # Test if it runs without errors
  needs:
    - job: generate-wax-spec
      artifacts: true
  tags:
    - public-runner-docker

